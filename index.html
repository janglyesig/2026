<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>서울아트센터 본부</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0A192F">
    <style>
        :root { --gold: #D4AF37; --navy: #0A192F; --glass: rgba(255, 255, 255, 0.08); }
        * { box-sizing: border-box; }
        body { background: var(--navy); color: white; font-family: 'Apple SD Gothic Neo', sans-serif; margin: 0; padding: 8vw 5vw; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .wrapper { width: 100%; max-width: 500px; }
        .header { text-align: center; margin-bottom: 6vh; }
        .header p { font-size: 0.8rem; opacity: 0.5; margin: 0 0 5px 0; letter-spacing: 2px; }
        .header h1 { color: var(--gold); font-size: 2rem; margin: 0; font-weight: bold; }
        .menu-grid { display: flex; flex-direction: column; gap: 4vw; }
        .menu-card { background: var(--glass); border: 1px solid rgba(212,175,55,0.2); padding: 22px; border-radius: 14px; color: white; font-size: 1.1rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; text-decoration: none; transition: 0.2s; }
        .menu-card:active { background: var(--gold); color: var(--navy); transform: scale(0.98); }
        .menu-card span.icon { margin-right: 15px; font-size: 1.3rem; }
        .menu-card span.arrow { color: var(--gold); opacity: 0.7; }
        .menu-card:active span.arrow { color: var(--navy); }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="header">
        <p>SEOUL ART CENTER</p>
        <h1>스태프 본부 로비</h1>
    </div>

    <div class="menu-grid">
        <a href="sac-sound.html" class="menu-card" style="border-color: var(--gold); background: rgba(212,175,55,0.05);">
            <div><span class="icon">🔊</span>무대음향 팀 관제실</div>
            <span class="arrow">〉</span>
        </a>
        <a href="sac-stage.html" class="menu-card">
            <div><span class="icon">🚩</span>무대계도 팀</div>
            <span class="arrow">〉</span>
        </a>
        <a href="sac-light.html" class="menu-card">
            <div><span class="icon">💡</span>무대조명 팀</div>
            <span class="arrow">〉</span>
        </a>
        <a href="sac-video.html" class="menu-card">
            <div><span class="icon">📽️</span>무대영상 팀</div>
            <span class="arrow">〉</span>
        </a>
    </div>
</div>

</body>
</html>
