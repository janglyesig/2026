<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>무대음향 관제실</title>
    <script src="auth.js"></script>
    <style>
        :root { --gold: #FACC15; --navy: #0F172A; --card-bg: #1E293B; --border: #334155; --success: #10B981; --blue: #3B82F6; }
        body { background: var(--navy); color: white; font-family: sans-serif; margin: 0; min-height: 100vh; display: none; }
        body.secure-visible { display: block; padding: 20px; }
        .smart-btn { background: var(--card-bg); border: 2px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; font-size: 1.2rem; font-weight: 800; cursor: pointer; display: flex; justify-content: space-between; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; overflow-y: auto; padding: 20px; }
        .overlay.active { display: block; }
        .card { background: var(--card-bg); border: 2px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        input, select, textarea { width: 100%; padding: 15px; margin: 5px 0; border-radius: 8px; border: 2px solid var(--border); background: var(--navy); color: white; font-weight: bold; }
        .btn-block { width: 100%; padding: 15px; border-radius: 10px; font-weight: 800; border: none; cursor: pointer; color: white; margin-top: 5px; }
    </style>
</head>
<body>
    <div style="max-width: 600px; margin: auto;">
        <div class="smart-btn" onclick="openWin('win-schedule')">일정 관리 〉</div>
        <div class="smart-btn" onclick="openWin('win-dispatch')">차량 배차 〉</div>
        <div class="smart-btn" onclick="authAdmin()" style="border-color:var(--gold);">어드민 설정 〉</div>
    </div>

    <div id="win-schedule" class="overlay"><div class="card">
        <button onclick="closeWin('win-schedule')">닫기</button>
        <input type="date" id="viewDate" onchange="syncScheduleUI()">
        <div id="uiScheduleListContainer"></div>
        <input type="date" id="userSchDate"><input type="text" id="userSchInput"><button class="btn-block" onclick="addUserSchedule()">추가</button>
    </div></div>

    <div id="win-dispatch" class="overlay"><div class="card">
        <button onclick="closeWin('win-dispatch')">닫기</button>
        <div id="uiCarListUser"></div>
        <input type="text" id="dispatchDriverName" placeholder="성함">
        <select id="carSelectUser"></select><button class="btn-block" onclick="submitDispatchUser()">신청</button>
    </div></div>

    <script>
        function parseCSVLine(line) {
            const result = []; let current = ''; let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            return result.map(c => c.replace(/^"|"$/g, '').trim());
        }

        function cleanDateStr(d) { return d.replace(/[^0-9-]/g, ''); }

        // CSV 업로드: 전체 초기화 (데이터 대체)
        window.uploadScheduleCSV = function(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split(/\r?\n/);
                const imported = [];
                lines.forEach((line, index) => {
                    if(!line.trim() || index === 0 && line.includes('순번')) return;
                    const cols = parseCSVLine(line);
                    // 순번, 날짜, 시간, 제목, 장소, 구분
                    imported.push({ id: Date.now()+Math.random(), date: cleanDateStr(cols[1]), text: `[${cols[2]}] ${cols[3]} (${cols[4]})` });
                });
                if(confirm("기존 일정을 모두 지우고 새 데이터를 등록하시겠습니까?")) {
                    appSchedules = imported; commitStorage(); syncAdminUI(); alert('등록 완료.');
                }
            };
            reader.readAsText(file, "UTF-8");
        };

        window.uploadCarCSV = function(event) {
            const file = event.target.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const lines = e.target.result.split(/\r?\n/);
                const imported = [];
                lines.forEach((line, index) => {
                    if(!line.trim() || index === 0 && line.includes('순번')) return;
                    const cols = parseCSVLine(line);
                    const mileage = parseInt(cols[4].replace(/[^0-9]/g, ''), 10) || 0;
                    imported.push({ id: 'C'+Date.now()+Math.random(), name: `${cols[1]}(${cols[5]})`, status: true, mileage: mileage });
                });
                if(confirm("기존 차량 목록을 모두 지우고 CSV 데이터로 대체하시겠습니까?")) {
                    appCars = imported; commitStorage(); syncAdminUI(); alert('차량 데이터 등록 완료.');
                }
            };
            reader.readAsText(file, "UTF-8");
        };

        // UI 및 데이터 관리 함수들 (이전 버전 유지)
        function openWin(id) { document.getElementById(id).classList.add('active'); }
        function closeWin(id) { document.getElementById(id).classList.remove('active'); }
        // ... 기타 로직 동일 ...
    </script>
</body>
</html>
