<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>시스템 관리자 페이지</title>
    <script src="auth.js"></script>
    <style>
        /* 야외 시인성을 극대화한 고대비 컬러 스킴 */
        :root { 
            --gold: #FACC15; --navy: #0F172A; --card-bg: #1E293B; --border: #334155; 
            --danger: #EF4444; --blue: #3B82F6; 
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background: var(--navy); color: white; font-family: 'Apple SD Gothic Neo', sans-serif; 
            margin: 0; padding: 6vw 5vw; display: none; flex-direction: column; align-items: center; min-height: 100vh;
        }
        body.secure-visible { display: flex; }
        ::-webkit-scrollbar { display: none; }
        
        .container { width: 100%; max-width: 600px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 4vh; border-bottom: 2px solid var(--border); padding-bottom: 2vh; }
        .header h1 { color: var(--gold); margin: 0; font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; }
        .header p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin: 5px 0 0 0; font-weight: bold; }
        
        .card { background: var(--card-bg); border: 2px solid var(--border); padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .card h2 { color: white; margin-top: 0; font-size: 1.3rem; font-weight: 900; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; }
        
        /* 리스트 아이템 스타일 */
        .list-item { background: var(--navy); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid var(--gold); }
        .item-date { font-size: 12px; color: var(--gold); font-weight: bold; margin-bottom: 8px; }
        .item-text { font-size: 15px; line-height: 1.6; font-weight: bold; margin-bottom: 15px; word-break: keep-all; }
        
        /* 버튼 스타일 */
        .btn-group { display: flex; justify-content: flex-end; gap: 8px; border-top: 1px solid var(--border); padding-top: 12px; }
        .btn-sm { padding: 10px 16px; font-size: 13px; font-weight: 900; border: none; border-radius: 6px; cursor: pointer; color: white; }
        .btn-edit { background: var(--blue); }
        .btn-del { background: var(--danger); }
        
        /* 추가 폼 스타일 */
        .add-box { margin-top: 20px; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; border: 1px dashed var(--border); }
        textarea { width: 100%; padding: 14px; background: var(--navy); color: white; border: 2px solid var(--border); border-radius: 8px; font-size: 14px; font-weight: bold; outline: none; margin-bottom: 10px; resize: vertical; }
        textarea:focus { border-color: var(--gold); }
        .btn-block { width: 100%; padding: 14px; background: var(--gold); color: var(--navy); font-size: 15px; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; }
        
        .back-btn { display: block; text-align: center; color: rgba(255,255,255,0.6); font-weight: bold; text-decoration: none; margin-top: 10px; padding: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>시스템 통합 관제</h1>
        <p>공지사항 및 현장 지침 마스터 관리</p>
    </div>

    <div class="card" style="border-color: var(--gold);">
        <h2 style="color: var(--gold);">전부서 통합 공지사항 (메인)</h2>
        <div id="adminMainList">데이터를 불러오는 중입니다...</div>
        
        <div class="add-box">
            <textarea id="newMainText" rows="3" placeholder="메인 페이지에 노출될 새로운 공지를 입력하세요."></textarea>
            <button class="btn-block" onclick="addNotice('main')">통합 공지 추가 및 배포</button>
        </div>
    </div>

    <div class="card" style="border-color: var(--blue);">
        <h2 style="color: var(--blue);">팀별 현장 지침 (서브)</h2>
        <div id="adminSubList">데이터를 불러오는 중입니다...</div>
        
        <div class="add-box">
            <textarea id="newSubText" rows="3" placeholder="각 팀 관제실에 노출될 현장 지침을 입력하세요."></textarea>
            <button class="btn-block" style="background: var(--blue); color: white;" onclick="addNotice('sub')">현장 지침 추가 및 배포</button>
        </div>
    </div>

    <a href="index.html" class="back-btn">← 메인 로비로 돌아가기</a>
</div>

<script>
    // 화면이 열리고 auth.js 인증이 끝나면 이 함수가 자동으로 실행되어 리스트를 그립니다.
    window.syncNoticeUI = function() {
        renderAdminList('adminMainList', window.cloudData.notices_main, 'main');
        renderAdminList('adminSubList', window.cloudData.notices_sub, 'sub');
    };

    // 리스트 렌더링 함수
    function renderAdminList(elementId, array, type) {
        const box = document.getElementById(elementId);
        if (!array || array.length === 0) {
            box.innerHTML = "<div style='opacity:0.5; font-size:14px; font-weight:bold; padding: 10px 0;'>등록된 데이터가 없습니다.</div>";
            return;
        }

        let html = "";
        const sorted = [...array].reverse(); // 최신순 정렬
        
        sorted.forEach(n => {
            html += `
            <div class="list-item">
                <div class="item-date">${n.date}</div>
                <div class="item-text">${n.text.replace(/\n/g, '<br>')}</div>
                <div class="btn-group">
                    <button class="btn-sm btn-edit" onclick="editNotice('${type}', ${n.id})">수정</button>
                    <button class="btn-sm btn-del" onclick="deleteNotice('${type}', ${n.id})">삭제</button>
                </div>
            </div>`;
        });
        box.innerHTML = html;
    }

    // 1. 공지/지침 추가 기능
    window.addNotice = async function(type) {
        const inputId = type === 'main' ? 'newMainText' : 'newSubText';
        const text = document.getElementById(inputId).value.trim();
        
        if (!text) {
            alert("내용을 입력해 주십시오.");
            return;
        }

        const newItem = {
            id: Date.now(), // 고유 ID 부여
            text: text,
            date: new Date().toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' })
        };

        if (type === 'main') {
            if (!window.cloudData.notices_main) window.cloudData.notices_main = [];
            window.cloudData.notices_main.push(newItem);
        } else {
            if (!window.cloudData.notices_sub) window.cloudData.notices_sub = [];
            window.cloudData.notices_sub.push(newItem);
        }

        const success = await window.syncCloudData(); // 서버(Firebase)로 전송
        if (success) {
            document.getElementById(inputId).value = ""; // 입력창 초기화
            window.syncNoticeUI(); // 화면 새로고침
            alert("성공적으로 서버에 등록 및 배포되었습니다.");
        } else {
            alert("서버 동기화에 실패했습니다. 네트워크 상태를 확인하세요.");
        }
    };

    // 2. 공지/지침 수정 기능
    window.editNotice = async function(type, id) {
        let targetArray = type === 'main' ? window.cloudData.notices_main : window.cloudData.notices_sub;
        const index = targetArray.findIndex(n => n.id === id);
        
        if (index === -1) return;

        const newText = prompt("내용을 수정하십시오:", targetArray[index].text);
        
        // 취소를 누르거나 빈칸으로 확인을 누르면 무시
        if (newText === null || newText.trim() === "") return;

        targetArray[index].text = newText.trim();
        targetArray[index].date = new Date().toLocaleString('ko-KR', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }) + " (수정됨)";

        const success = await window.syncCloudData();
        if (success) {
            window.syncNoticeUI();
        } else {
            alert("서버 동기화에 실패했습니다.");
        }
    };

    // 3. 공지/지침 삭제 기능
    window.deleteNotice = async function(type, id) {
        if (!confirm("해당 항목을 영구적으로 삭제하시겠습니까?")) return;

        if (type === 'main') {
            window.cloudData.notices_main = window.cloudData.notices_main.filter(n => n.id !== id);
        } else {
            window.cloudData.notices_sub = window.cloudData.notices_sub.filter(n => n.id !== id);
        }

        const success = await window.syncCloudData();
        if (success) {
            window.syncNoticeUI();
        } else {
            alert("서버 동기화에 실패했습니다.");
        }
    };
</script>

</body>
</html>
